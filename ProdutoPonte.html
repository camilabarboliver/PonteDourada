<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <style>
       * {
            box-sizing: border-box;
        }

        body {
           background: linear-gradient(#FDA69B, #FB4E37);
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .principal {
            margin-top: 2%;
            width: 200%;
            max-width: 800px;
            padding: 4px;
            text-align: center;
            background-color: #cd424269;
            border-radius: 20px;
            opacity: 0.9;
        }

        img {
            width: 300px;
            height: 3000px;
            margin: 30px ;
         
        }

        h2 {
            font-size: 25px;
            color: rgb(252, 253, 255);
            margin: 20px;
        }

        p {
            color: #e2e5ea;
            margin-bottom: 30px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 18px;
            color: #dfe1e4;
            margin-bottom: 5px;
            margin-left: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 25px;
            border: solid;
            background-color: #f0f1f2;
            font-size: 1em;
            color: #1581b7;
        }

        input[type="button"] {
            width: 100%;
            padding: 15px;
            background-color: rgb(246, 82, 70);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 30px;
             text-align: center;
            
        }

        input[type="button"]:hover {

            background: #CB2B16
            ;
            cursor: pointer;
            box-sizing: border-box;
        }

        button:hover {
            background-color: #5c6e77;
        }
        .banner {
    background: rgba(155, 22, 22, 0.1);
    backdrop-filter: blur(6px);
    text-align: center;
    padding: 50px 20px;
    border-radius: 0 0 15px 15px;
}
.topo {
    margin-bottom: 20px;
}

.banner img {
  width: 300px;
  height: 100px;
}
    </style>
</head>
 <div class="banner">

<body>
    <div class=" produto">


        <h1>Cadastro de Produtos </h1>


        <form>
            <label>Produto:</label>
            <input type="text" id="produto" name="produto" required>
            <label>Tipo:</label>
            <input type="text" id="tipo" name="tipo" required>
            <label>Fornecedor:</label>
            <input type="text" id="fornecedor" name="fornecedor" required>
            <input type="button" value=" VOLTAR " id="senha" onclick="voltar()">
            <input type="button" value=" SALVAR PRODUTO " id="senha" onclick="salvar()">
            <input type="button" value=" ATENDIMENTO PRODUTO " id="senha" onclick="atender()">
        </form>
    </div>
    <script>
       
    
function salvar(){
    window.alert("Produto Cadastrado com Sucesso");
document.getElementById('produto').value="";
document.getElementById('tipo').value="";
document.getElementById('fornecedor').value="";

window.location.href="telaprincipal.html";

}
function atender(){
window.location.href="AtendimentoProdutoPonte.html";
}
function voltar(){
    window.location.href="FornecedorPonte.html";
}
    </script>

</body>

</html>
